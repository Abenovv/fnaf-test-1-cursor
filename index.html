<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>Five Nights at Freddy's — Analog Horror Edition</title>

  <!-- Tailwind CSS via CDN (build-free, Vercel-compatible) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            horror: ['"VT323"', 'monospace'],
            body: ['"Share Tech Mono"', 'monospace'],
          },
          colors: {
            horror: {
              black: '#050507',
              dark: '#0a0a0f',
              red: '#8b0000',
              amber: '#b8860b',
              dim: '#1a1a20',
            },
          },
        },
      },
    };
  </script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    /* Base resets for fullscreen canvas game */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050507; }
    body { font-family: 'Share Tech Mono', monospace; color: #ccc; }

    /* Canvas fills viewport */
    #game-canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      display: block; cursor: none;
    }

    /* UI overlay layer */
    #ui-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
    }
    #ui-layer > * { pointer-events: auto; }

    /* Loading screen */
    #loading-screen {
      position: fixed; inset: 0; z-index: 100;
      background: #050507;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }

    /* CRT scanline overlay – pure CSS, zero JS cost */
    #crt-overlay {
      position: fixed; inset: 0; z-index: 5; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      animation: scanlines 8s linear infinite;
    }
    @keyframes scanlines {
      0%   { background-position: 0 0; }
      100% { background-position: 0 100px; }
    }

    /* Vignette overlay */
    #vignette-overlay {
      position: fixed; inset: 0; z-index: 4; pointer-events: none;
      background: radial-gradient(
        ellipse at center,
        transparent 50%,
        rgba(0,0,0,0.75) 100%
      );
    }

    /* Debug overlay */
    #debug-overlay {
      position: fixed; top: 8px; left: 8px; z-index: 200;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,100,0,0.3);
      padding: 6px 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #ff6400;
      line-height: 1.6;
      min-width: 200px;
      display: none;
      pointer-events: none;
    }
    #debug-overlay.visible { display: block; }

    /* Cursor custom — crosshair-free */
    canvas { cursor: none; }
  </style>
</head>
<body>

  <!-- Main 3D canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- Atmosphere overlays (CSS-driven, zero GPU cost) -->
  <div id="crt-overlay"></div>
  <div id="vignette-overlay"></div>

  <!-- Primary UI layer -->
  <div id="ui-layer">
    <!-- Populated dynamically by UIManager -->
  </div>

  <!-- Debug overlay (toggled with F3) -->
  <div id="debug-overlay"></div>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div class="text-center select-none">
      <h1 class="font-horror text-horror-red text-6xl mb-4 tracking-widest"
          style="font-family:'VT323',monospace; color:#8b0000; font-size:4rem; letter-spacing:0.2em; text-shadow:0 0 20px #8b0000;">
        FAZBEAR ENTERTAINMENT
      </h1>
      <p class="font-body text-sm mb-8"
         style="font-family:'Share Tech Mono',monospace; color:#555; font-size:0.75rem; letter-spacing:0.15em;">
        SURVEILLANCE PROTOCOL v3.7 — INITIALIZING
      </p>
      <!-- Progress bar -->
      <div style="width:320px; height:2px; background:#111; margin:0 auto 16px;">
        <div id="loading-bar" style="height:100%; width:0%; background:#8b0000; transition:width 0.3s ease; box-shadow:0 0 8px #8b0000;"></div>
      </div>
      <p id="loading-status" style="font-family:'Share Tech Mono',monospace; color:#333; font-size:0.65rem; letter-spacing:0.1em;">
        LOADING ASSETS...
      </p>
    </div>
  </div>

  <!-- Three.js import map (required for post-processing addons) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>

  <!-- Game entry point (ES module) -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
